<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YANZ OTAK MODDING | X-PROJECT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f3ff; --dark: #020617; }
        body { background-color: var(--dark); color: #f8fafc; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(0, 243, 255, 0.2); }
        .neon-border { border: 1px solid var(--cyan); box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); }
        .bg-grid { background-image: linear-gradient(to right, rgba(0, 243, 255, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(0, 243, 255, 0.05) 1px, transparent 1px); background-size: 30px 30px; }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.2), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .scan-line { width: 100%; height: 2px; background: var(--cyan); position: absolute; top: 0; left: 0; box-shadow: 0 0 15px var(--cyan); animation: scan 2s linear infinite; display: none; z-index: 20; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .tab-active { color: var(--cyan); border-bottom: 2px solid var(--cyan); }
        .hidden { display: none !important; }
        .marquee-parent { overflow: hidden; background: rgba(0, 243, 255, 0.05); border-y: 1px solid rgba(0, 243, 255, 0.1); }
        .marquee-child { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(5deg); } }
        .float-wa { animation: float 3s ease-in-out infinite; }
        .float-tt { animation: float 4s ease-in-out infinite; animation-delay: 1s; }
        @keyframes tabFade { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-tab { animation: tabFade 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    </style>
</head>
<body class="bg-grid min-h-screen flex flex-col items-center">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="w-full max-w-md flex flex-col items-center justify-center min-h-screen px-8 z-10">
        <div class="w-24 h-24 mb-6 relative">
            <div class="absolute inset-0 rounded-full border-2 border-cyan-500 animate-ping opacity-25"></div>
            <div class="glass w-full h-full rounded-full flex items-center justify-center border-2 border-cyan-500 overflow-hidden">
                <img src="https://i.ibb.co.com/ycVSK4FH/7a9641b08521765946e1abcd92d991ad.jpg" class="w-full h-full object-cover">
            </div>
        </div>
        <div class="glass w-full p-8 rounded-3xl text-center relative overflow-hidden">
            <div id="scan-bar" class="scan-line"></div>
            <div class="shimmer absolute top-0 left-0 w-full h-1"></div>
            <h1 class="font-cyber text-2xl font-bold mb-1 tracking-tighter uppercase">X-Sensi <span class="text-cyan-500">System</span></h1>
            <p class="text-[10px] text-slate-500 tracking-[0.3em] mb-8 uppercase">Development: Yanz Official</p>
            <div class="space-y-4">
                <input type="text" id="user-name" placeholder="USERNAME" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-4 px-6 text-center focus:outline-none focus:border-cyan-500 transition-all font-cyber text-xs uppercase tracking-widest">
                <input type="password" id="user-pw" placeholder="PASSWORD" class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-4 px-6 text-center focus:outline-none focus:border-cyan-500 transition-all font-cyber text-xs tracking-widest">
                <button onclick="handleLogin()" id="btn-login" class="w-full bg-cyan-600 text-black font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(0,243,255,0.3)] font-cyber uppercase text-sm">LOGIN</button>
            </div>
            <p class="mt-6 text-[10px] text-slate-600 uppercase">Status: <span id="sys-status">Standby</span></p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="main-dashboard" class="hidden w-full max-w-md flex flex-col min-h-screen pb-28 relative">
        <div class="marquee-parent w-full py-1 mt-2">
            <p id="slide-notif" class="marquee-child text-[10px] text-cyan-400 font-bold uppercase tracking-widest">Loading system announcement...</p>
        </div>

        <div class="p-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://i.ibb.co.com/ycVSK4FH/7a9641b08521765946e1abcd92d991ad.jpg" class="w-10 h-10 rounded-lg border border-cyan-500 object-cover">
                <div>
                    <p class="text-[10px] text-cyan-500 font-bold tracking-widest uppercase">Operator</p>
                    <h2 id="display-user" class="font-cyber text-lg uppercase font-bold">...</h2>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Balance</p>
                <p id="top-balance" class="text-xs font-bold text-cyan-400 tracking-tighter uppercase">Rp 0</p>
            </div>
        </div>

        <!-- TAB HOME -->
        <div id="content-home" class="px-6 space-y-6">
            <div class="glass rounded-2xl p-5 border-l-2 border-l-orange-500">
                <div class="flex items-center gap-3 mb-4 text-orange-500"><span>🎮</span><h3 class="font-bold text-sm uppercase text-white">Game Version</h3></div>
                <select id="ff-ver" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-xs font-cyber text-orange-400 outline-none appearance-none cursor-pointer uppercase tracking-widest">
                    <option value="com.dts.freefireth">Free Fire Original</option>
                    <option value="com.dts.freefiremax">Free Fire MAX</option>
                </select>
            </div>

            <div class="glass rounded-2xl p-5 border-l-2 border-l-cyan-500">
                <div class="flex items-center gap-3 mb-4 text-cyan-500"><span>📱</span><h3 class="font-bold text-sm uppercase text-white">Resolution</h3></div>
                <select id="wm-val" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-xs font-cyber text-cyan-400 outline-none appearance-none cursor-pointer uppercase tracking-widest">
                    <option value="reset">Default (Reset)</option>
                    <option value="1080x2400">1080 x 2400 (Head Lock)</option>
                    <option value="720x1600">720 x 1600 (Headshot Only)</option>
                </select>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <button onclick="toggleMod(this)" class="glass rounded-2xl p-4 flex flex-col items-center gap-2 border-l-4 border-l-slate-700 active:scale-95 transition-all">
                    <span class="text-2xl">🎯</span><span class="text-[10px] font-bold uppercase tracking-wider text-center">Aim Lock</span>
                </button>
                <button onclick="toggleMod(this)" class="glass rounded-2xl p-4 flex flex-col items-center gap-2 border-l-4 border-l-slate-700 active:scale-95 transition-all">
                    <span class="text-2xl">⚡</span><span class="text-[10px] font-bold uppercase tracking-wider text-center">Stabilizer</span>
                </button>
                <button onclick="toggleMod(this)" class="glass rounded-2xl p-4 flex flex-col items-center gap-2 border-l-4 border-l-slate-700 active:scale-95 transition-all">
                    <span class="text-2xl">🔒</span><span class="text-[10px] font-bold uppercase tracking-wider text-center">Drag Lock</span>
                </button>
            </div>
            <button onclick="executeAll()" class="w-full py-4 rounded-xl bg-white text-black font-black font-cyber text-sm tracking-widest shadow-lg shadow-white/5 uppercase">Apply System</button>
        </div>

        <!-- TAB MASTER -->
        <div id="content-admin" class="hidden px-6 space-y-6">
            <h3 class="font-cyber text-cyan-500 text-center text-sm tracking-[0.3em] uppercase mb-4">Master Control</h3>
            <div class="glass rounded-2xl p-5 border-l-2 border-l-purple-500">
                <h4 class="text-[10px] font-bold uppercase mb-4 text-slate-400">Register New User</h4>
                <div class="space-y-3">
                    <input type="text" id="new-user-id" placeholder="USERNAME" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-[10px] text-white outline-none">
                    <input type="text" id="new-user-pw" placeholder="PASSWORD" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-[10px] text-white outline-none">
                    <select id="new-user-role" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-[10px] text-cyan-500 outline-none">
                        <option value="member">MEMBER (1K)</option>
                        <option value="reseller">RESELLER (10K)</option>
                    </select>
                    <input type="date" id="new-user-exp" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-[10px] text-white outline-none">
                    <button onclick="addNewUser()" class="w-full py-3 bg-cyan-600 rounded-lg text-[10px] font-bold uppercase text-black">Create Account</button>
                </div>
            </div>
        </div>

        <!-- TAB ACCOUNT -->
        <div id="content-acc" class="hidden px-6 pt-10 text-center relative">
            <div class="w-20 h-20 bg-slate-800 rounded-full mx-auto border-2 border-cyan-500 flex items-center justify-center mb-4 overflow-hidden">
                <img src="https://i.ibb.co.com/ycVSK4FH/7a9641b08521765946e1abcd92d991ad.jpg" class="w-full h-full object-cover">
            </div>
            <h2 id="acc-name" class="font-cyber text-lg uppercase">...</h2>
            <p id="acc-role" class="text-[10px] text-cyan-500 mb-6 tracking-widest uppercase">Role: User</p>
            
            <div class="glass rounded-2xl p-6 text-left space-y-4">
                <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                    <span class="text-[10px] text-slate-500 uppercase">Balance</span>
                    <span id="acc-balance" class="text-[10px] text-cyan-400 font-bold">Rp 0</span>
                </div>
                <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                    <span class="text-[10px] text-slate-500 uppercase">Device ID</span>
                    <span id="display-hwid" class="text-[9px] text-slate-500 font-mono">...</span>
                </div>
            </div>
            <button onclick="location.reload()" class="mt-10 text-[10px] text-red-500 font-bold uppercase tracking-widest">Logout</button>
        </div>

        <!-- BOTTOM NAV -->
        <div class="fixed bottom-6 left-6 right-6 h-20 glass rounded-3xl flex justify-around items-center px-4">
            <button onclick="switchTab('home')" id="btn-home" class="flex flex-col items-center gap-1 tab-active"><span class="text-xl">🛠️</span><span class="text-[9px] font-bold uppercase">Home</span></button>
            <button onclick="switchTab('admin')" id="btn-admin" class="hidden flex flex-col items-center gap-1 text-slate-500"><span class="text-xl">🔑</span><span class="text-[9px] font-bold uppercase">Master</span></button>
            <button onclick="switchTab('acc')" id="btn-acc" class="flex flex-col items-center gap-1 text-slate-500"><span class="text-xl">👤</span><span class="text-[9px] font-bold uppercase">User</span></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBqIqdlzzXoZoT8N_J9HRmpoJvbH05Da4c",
            databaseURL: "https://inject-60ad5-default-rtdb.firebaseio.com",
            projectId: "inject-60ad5",
            storageBucket: "inject-60ad5.firebasestorage.app",
            messagingSenderId: "1043671474298",
            appId: "1:1043671474298:android:2276352c0d88ebd9709bc3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userData = { name: '', role: '', balance: 0 };
        let isLoggedIn = false;

        function handleLogin() {
            const user = document.getElementById('user-name').value;
            const pass = document.getElementById('user-pw').value;
            const status = document.getElementById('sys-status');
            const scanBar = document.getElementById('scan-bar');

            if(!user || !pass) return alert("Masukan Username & Password!");
            
            status.innerText = "AUTHENTICATING...";
            scanBar.style.display = "block";

            db.ref('users/' + user).once('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.password === pass) {
                    isLoggedIn = true;
                    userData.name = user;
                    userData.role = data.role || "member";
                    userData.balance = data.balance || 0;
                    
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-dashboard').classList.remove('hidden');
                    document.getElementById('display-user').innerText = user;
                    document.getElementById('acc-name').innerText = user;
                    document.getElementById('acc-role').innerText = "ROLE: " + userData.role.toUpperCase();
                    document.getElementById('acc-balance').innerText = "Rp " + userData.balance.toLocaleString();
                    document.getElementById('top-balance').innerText = "Rp " + userData.balance.toLocaleString();
                    document.getElementById('display-hwid').innerText = localStorage.getItem('X_SENSI_HWID') || "NO_ID";

                    if(["owner", "reseller", "developer"].includes(userData.role.toLowerCase())) {
                        document.getElementById('btn-admin').classList.remove('hidden');
                    }
                    
                    // Notif Marquee
                    db.ref('system_settings/announcement').on('value', (snap) => {
                        document.getElementById('slide-notif').innerText = snap.val() || "Welcome to X-Sensi";
                    });

                    // REALTIME MATCHMAKING KICKER
                    db.ref('system_settings/match_set').on('value', (snap) => {
                        const isMatchOn = snap.val() === "true";
                        // Jika match ON dan user adalah member biasa (bukan owner/admin), paksa logout
                        if (isMatchOn && isLoggedIn && !["owner", "developer"].includes(userData.role.toLowerCase())) {
                            alert("SECURITY: Matchmaking detected. System restart required.");
                            location.reload(); 
                        }
                    });

                } else {
                    status.innerText = "INVALID ACCOUNT";
                    scanBar.style.display = "none";
                }
            });
        }

        function addNewUser() {
            const id = document.getElementById('new-user-id').value;
            const pw = document.getElementById('new-user-pw').value;
            const role = document.getElementById('new-user-role').value;
            const exp = document.getElementById('new-user-exp').value;
            const cost = (role === "reseller") ? 10000 : 1000;

            if(!id || !pw || !exp) return alert("Lengkapi data!");
            if(userData.balance < cost) return alert("Saldo Kurang! Butuh: Rp " + cost.toLocaleString());

            if(confirm(`Buat akun ${id}? Potong saldo Rp ${cost.toLocaleString()}`)) {
                db.ref('users/' + id).set({
                    password: pw,
                    role: role,
                    expired: exp,
                    balance: 0,
                    status: 'active'
                }).then(() => {
                    const newBal = userData.balance - cost;
                    db.ref('users/' + userData.name).update({ balance: newBal });
                    userData.balance = newBal;
                    document.getElementById('top-balance').innerText = "Rp " + newBal.toLocaleString();
                    alert("Berhasil dibuat!");
                });
            }
        }

        function switchTab(target) {
            ['home', 'acc', 'admin'].forEach(t => {
                document.getElementById('content-' + t).classList.add('hidden');
                document.getElementById('btn-' + t).classList.remove('tab-active');
            });
            document.getElementById('content-' + target).classList.remove('hidden');
            document.getElementById('btn-' + target).classList.add('tab-active');
        }

        function toggleMod(el) {
            el.classList.toggle('neon-border');
            el.classList.toggle('bg-cyan-500/10');
            el.classList.toggle('border-l-cyan-500');
        }

        function executeAll() {
            const ff = document.getElementById('ff-ver').value;
            const wm = document.getElementById('wm-val').value;
            alert(`Applied to ${ff} with resolution ${wm}`);
        }
    </script>
</body>
</html>
